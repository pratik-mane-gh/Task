<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Practice</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!--CSS Animation Practice
        Create a webpage demonstrating:
        Moving circle
        Rotating square
        Bouncing ball
        Loading spinner
        Use @keyframes.-->
  <main>
    <div class="container">

      <!--Moving Circle-->
      <div class="card">
        <div class="card-header">
          <h3>Moving Circle</h3>
        </div>
        <div class="circle-card"></div>
      </div>

      <!--Rotating Square-->
      <div class="card">
        <div class="card-header">
          <h3>Rotating Square</h3>
        </div>
        <div class="square-card"></div>
      </div>

    </div>

    <div class="container">
      <!--Bouncing Ball-->
      <div class="card">
        <div class="card-header">
          <h3>Bouncing Ball</h3>
        </div>
        <div class="bouncing-card"></div>
      </div>

      <!--Loading Spinner-->
      <div class="card">
        <div class="card-header">
          <h3>Loading Spinner</h3>
        </div>
        <div class="spinner-card"></div>
      </div>
    </div>


  </main>

</body>

</html>
